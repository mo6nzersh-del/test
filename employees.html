<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الموظفين - أحمد وحمدي</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/auth-guard-C6CJ8_8i.css" />
  <style>
    /* ── شريط التنقل بين الأشهر ── */
    .month-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:14px 20px;margin-bottom:16px}
    .month-label{font-size:18px;font-weight:800;color:var(--primary-dark);flex:1;text-align:center}

    /* ── أزرار الحالة ── */
    .status-group{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
    .status-btn{border:1.5px solid var(--border);background:var(--surface);border-radius:8px;
      padding:5px 11px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);
      cursor:pointer;transition:background .12s,color .12s,border-color .12s,transform .08s;
      white-space:nowrap}
    .status-btn:hover{transform:translateY(-1px)}
    .status-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .s-present:hover,.s-present.active{background:#e7f5ec;color:#1a6b3a;border-color:#6abf8a}
    .s-absent:hover,.s-absent.active{background:#fce8e5;color:var(--danger);border-color:#e89080}
    .s-paid:hover,.s-paid.active{background:#e8f0fb;color:#2a5bbf;border-color:#7aa0e0}
    .s-unpaid:hover,.s-unpaid.active{background:#fdf4e3;color:#a06a10;border-color:#d4a854}

    /* تلوين الصفوف */
    .cal-row:has(.s-present.active){background:#f5fcf7}
    .cal-row:has(.s-absent.active){background:#fdf5f4}
    .cal-row:has(.s-paid.active){background:#f4f7fd}
    .cal-row:has(.s-unpaid.active){background:#fefaf3}

    /* ── جدول التقويم ── */
    .attendance-calendar{width:100%;border-collapse:collapse}
    .attendance-calendar th{text-align:right;font-size:12.5px;font-weight:700;color:var(--muted);
