<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التجار - أحمد وحمدي</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/auth-guard-C6CJ8_8i.css" />
  <style>
    /* ── سجل حركات التاجر ── */
    .record-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
      border-bottom:1px solid var(--border)}
    .record-row:last-child{border-bottom:none}
    .record-badge{display:inline-flex;align-items:center;justify-content:center;
      font-size:11.5px;font-weight:700;border-radius:6px;padding:3px 10px;
      white-space:nowrap;min-width:60px}
    .record-badge.in {background:#e7f5ec;color:#1a6b3a}
    .record-badge.out{background:#fce8e5;color:#b3432f}
    .record-main{flex:1}
    .record-main .title{font-size:14px;font-weight:600;color:var(--ink)}
    .record-main .meta{font-size:12px;color:var(--muted);margin-top:2px}
    .record-amount{font-size:15px;font-weight:800;white-space:nowrap}
    .record-amount.in {color:#1a6b3a}
    .record-amount.out{color:#b3432f}
    .delete-btn{border:none;background:transparent;color:var(--muted);
      font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer}
    .delete-btn:hover{background:var(--danger-soft);color:var(--danger)}

    /* ── بطاقات الإحصائيات ── */
    .mer-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
    .mer-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .12s,box-shadow .12s}
    .mer-stat:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.11)}
    .mer-stat .msk{font-size:13px;color:var(--ink);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
    .mer-stat .msv{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
    .mer-stat .mss{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
    .mer-stat.stat-in {background:linear-gradient(135deg,#e8f8ee 0%,#f4fcf7 100%);border-color:#a8dbb7}
    .mer-stat.stat-out{background:linear-gradient(135deg,#fde8e5 0%,#fff4f2 100%);border-color:#f0b3a8}
    .mer-stat.stat-net{background:linear-gradient(135deg,#e8f0fb 0%,#f4f8ff 100%);border-color:#a8c2f0}

    /* ── بادجات المالية ── */
    .type-badge{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px}
    .tb-advance{background:#e8f0fb;color:#2a5bbf}
    .tb-withdrawal{background:#fce8e5;color:#b3432f}
    .tb-deposit{background:#e7f5ec;color:#1a6b3a}
    .tb-merchant{background:#fdf4e3;color:#7a4f10}
    .tb-other{background:#f2f2f2;color:#666}
    .rec-id{font-size:11px;color:var(--muted);font-weight:700;background:var(--bg);
      border:1px solid var(--border);border-radius:6px;padding:2px 7px;white-space:nowrap;
      font-family:monospace,Cairo,sans-serif}

    /* ── روابط الأسماء القابلة للنقر ── */
    .link-cell{cursor:pointer;color:var(--primary-dark,#2a5bbf);font-weight:700}
    .link-cell:hover{text-decoration:underline}

    /* ── فلتر بار ── */
    .filter-bar{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .filter-bar .field{margin:0}

    /* ── toggle group ── */
    .toggle-group{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
    .toggle-group button{flex:1;border:none;background:var(--surface);padding:8px 18px;
      font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;
      transition:background .12s,color .12s}
    .toggle-group button.active.in {background:#e7f5ec;color:#1a6b3a}
    .toggle-group button.active.out{background:#fce8e5;color:#b3432f}

    @media print{
      *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      #topbar,.page-header,.section-tabs,.back-link,.filter-bar,
      .btn,.row-actions,.modal-overlay{display:none!important}
      body{background:#fff!important}
      .page{max-width:100%!important;padding:10px 20px!important;margin:0!important}
      .panel{box-shadow:none!important;border:1.5px solid #ccc!important;
        margin-bottom:14px!important;page-break-inside:avoid}
      .record-row{border:1px solid #eee!important;margin-bottom:4px;border-radius:6px}
      .delete-btn{display:none!important}
    }
  </style>
</head>
<body>
<div id="app">
  <header id="topbar" class="topbar"></header>
  <main class="page">

    <!-- ═══════ قائمة التجار ═══════ -->
    <div id="list-section">
      <div class="page-header">
        <div>
          <h2>التجار</h2>
          <p>إدارة قائمة التجار وسجلات الحساب والدفعات المالية</p>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h3>التجار</h3>

        <div class="table-wrap">

              <th>الرصيد الإجمالي</th><th></th>

            <tbody id="merchants-tbody">
              <tr><td colspan="5"><div class="empty-state">جارِ التحميل...</div></td></tr>

    </div>

    <!-- ═══════ تفاصيل التاجر ═══════ -->

      <div class="detail-header">

        <div class="detail-info">

      <div class="info-grid">
        <div class="info-chip"><div class="k">الهاتف</div><div class="v" id="detail-phone">—</div></div>
        <div class="info-chip"><div class="k">البريد</div><div class="v" id="detail-email">—</div></div>
        <div class="info-chip">

      <!-- ── إحصائيات الحساب ── -->
      <div class="mer-stats" id="mer-unified-stats"></div>

      <!-- ── كشف الحساب الموحد ── -->
      <div class="panel print-target">
        <div class="panel-header">
          <h3>كشف الحساب الموحد</h3>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <button type="button" id="add-fin-tx-btn"
              style="display:inline-flex;align-items:center;gap:7px;background:#1a6b3a;color:#fff;
                     border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:800;
                     font-family:inherit;cursor:pointer;box-shadow:0 2px 8px rgba(26,107,58,.3);
                     transition:background .15s,transform .1s"
              onmouseover="this.style.background='#145c30'"
              onmouseout="this.style.background='#1a6b3a'">
              💳 تسجيل دفعة مالية
            </button>
            <button type="button" class="btn small outline" id="export-csv-btn">📥 CSV</button>
            <button type="button" class="btn small outline" onclick="window.print()">🖨️ طباعة</button>
          </div>
        </div>
        <div class="filter-bar" style="padding:0 20px 14px">
          <div class="field">
            <label for="filter-from">من تاريخ</label>
            <input type="date" id="filter-from" />
          </div>
          <div class="field">
            <label for="filter-to">إلى تاريخ</label>
            <input type="date" id="filter-to" />
          </div>
          <button type="button" class="btn small outline" id="filter-apply-btn">تصفية</button>
          <button type="button" class="btn small outline" id="filter-clear-btn">مسح الفلتر</button>
        </div>
        <div class="records-list" id="unified-list">
          <div class="empty-state">جارِ التحميل...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ═══════ نافذة إضافة دفعة مالية للتاجر ═══════ -->

</div>

<!-- ═══════ نافذة إضافة / تعديل تاجر ═══════ -->
<div class="modal-overlay" id="merchant-modal">
  <div class="modal-box">
    <div class="modal-box-header">
      <h3 id="merchant-modal-title">إضافة تاجر</h3>
      <button type="button" class="modal-close" id="merchant-modal-close">&times;</button>
    </div>

      <input type="hidden" id="merchant-id" />

        <label for="merchant-name">اسم التاجر *</label>

      </div>
      <div class="field">
        <label for="merchant-phone">رقم الهاتف</label>

<!-- ═══════ Firebase ═══════ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
                            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc,
  addDoc, updateDoc, deleteDoc,
  query, where, orderBy, onSnapshot,
  serverTimestamp, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:            "AIzaSyDQsaNVskKiV2cwPVlJDixpTD1S-Dhp7gs",
  authDomain:        "reta-and-hamd.firebaseapp.com",
  projectId:         "reta-and-hamd",
  storageBucket:     "reta-and-hamd.firebasestorage.app",
  messagingSenderId: "220767743863",
  appId:             "1:220767743863:web:2ecd37bd5830a39ec1bb72"
});
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = "/"; return; }
  renderNav(user);
  init();
});

function renderNav(user){
  const pages=[
    {href:"dashboard.html",label:"الرئيسية"},
    {href:"products.html", label:"المنتجات"},
    {href:"merchants.html",label:"التجار"},
    {href:"employees.html",label:"الموظفين"},
    {href:"finance.html",  label:"المالية"},
  ];
  document.getElementById("topbar").innerHTML=`
    <div class="topbar-inner">
      <div class="brand"><span class="mark">أ</span><span>أحمد وحمدي</span></div>
      <nav class="nav-tabs">${pages.map(p=>`<a href="/${p.href}" class="${p.href==="merchants.html"?"active":""}">${p.label}</a>`).join("")}</nav>
      <div class="user-chip">
        <span>${user.email??""}</span>
        <button class="icon-btn" id="logout-btn">خروج</button>
      </div>
    </div>`;
  document.getElementById("logout-btn").addEventListener("click",()=>signOut(auth).then(()=>location.href="/"));
}

/* ── حالة ── */
let merchants      = [];
let merchantTxs    = [];   // merchantTransactions (النظام الأصلي)
let finTxs         = [];   // finance_transactions (الجديد)
let activityOpMap  = {};   // opId → OP-XXXXX من سجل المنتجات
let currentMerId   = null;
let editMerId      = null;
let txDir          = "in";
let merFinUnsub    = null;

/* ── أدوات ── */
const esc = t => { const d=document.createElement("div"); d.textContent=t??""; return d.innerHTML; };
const fmt = n => new Intl.NumberFormat("ar-EG",{maximumFractionDigits:2}).format(n||0)+" ج.م";
const fmtDate = s => s ? new Date(s+"T00:00:00").toLocaleDateString("ar-EG",
  {year:"numeric",month:"long",day:"numeric"}) : "—";
const fmtTs = ts => {
  if(!ts) return "—";
  const d=ts.toDate?.()??new Date(ts);
  return d.toLocaleDateString("ar-EG",{year:"numeric",month:"long",day:"numeric"});
};

function toast(msg,err=false){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg;
  t.className=`toast show${err?" error-toast":""}`;
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{ t.className="toast"; },2600);
}

function calcBalance(merId){
  // الحركات المباشرة (merchantTransactions)
  const directBal=merchantTxs.filter(t=>t.merchantId===merId)
    .reduce((s,t)=>s+(t.type==="out"?-t.amount:t.amount),0);
  // دفعات المالية (finance_transactions نوع تاجر)
  const finBal=finTxs.filter(t=>t.merchantId===merId)
    .reduce((s,t)=>s+(t.dir==="in"?t.amount:-t.amount),0);
  return directBal+finBal;
}

/* ── تn�يئة ── */
let pendingOpenId=new URLSearchParams(window.location.search).get("id");
function init(){
  setupMerchantModal();
  setupDetail();
  loadMerchants();
  loadAllMerchantTxs();
  loadFinTxs();
  loadActivityOpMap();
}

/* ── نافذة التاجر ── */
function setupMerchantModal(){
  const modal=document.getElementById("merchant-modal");
  document.getElementById("add-merchant-btn").addEventListener("click",()=>openMerModal(null));
  document.getElementById("merchant-modal-close").addEventListener("click",closeMerModal);
  modal.addEventListener("click",e=>{ if(e.target===modal) closeMerModal(); });
  document.getElementById("merchant-form").addEventListener("submit",saveMerchant);
}
function openMerModal(mer){
  document.getElementById("merchant-form").reset();
  if(mer){
    editMerId=mer.id;
    document.getElementById("merchant-modal-title").textContent="تعديل التاجر";
    document.getElementById("merchant-name").value   =mer.name??"";
    document.getElementById("merchant-address").value=mer.address??"";
    document.getElementById("merchant-phone").value  =mer.phone??"";
    document.getElementById("merchant-email").value  =mer.email??"";
  } else {
    editMerId=null;
    document.getElementById("merchant-modal-title").textContent="إضافة تاجر";
  }
  document.getElementById("merchant-modal").classList.add("open");
}
function closeMerModal(){ document.getElementById("merchant-modal").classList.remove("open"); editMerId=null; }

async function saveMerchant(e){
  e.preventDefault();
  const name=document.getElementById("merchant-name").value.trim(); if(!name) return;
  const btn=document.getElementById("merchant-submit-btn");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try{
    const data={
      name,
      address:document.getElementById("merchant-address").value.trim(),
      phone:  document.getElementById("merchant-phone").value.trim(),
      email:  document.getElementById("merchant-email").value.trim(),
    };
    if(editMerId){ await updateDoc(doc(db,"merchants",editMerId),data); toast("تم تحديث التاجر"); }
    else { await addDoc(collection(db,"merchants"),{...data,createdAt:serverTimestamp()}); toast("تمت إضافة التاجر"); }
    closeMerModal();
  }catch(err){ console.error(err); toast("خطأ أثناء الحفظ",true); }
  finally{ btn.disabled=false; btn.textContent="حفظ التاجر"; }
}

/* ── تحميل البيانات ── */
function loadMerchants(){
  onSnapshot(collection(db,"merchants"),snap=>{
    merchants=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
    if(currentMerId) fillHeader();
    if(pendingOpenId){
      const id=pendingOpenId; pendingOpenId=null;
      if(merchants.some(m=>m.id===id)) openDetail(id);
    }
  },err=>{ console.error(err); });
}

function loadAllMerchantTxs(){
  const q=query(collection(db,"merchantTransactions"),orderBy("createdAt","desc"));
  onSnapshot(q,snap=>{
    merchantTxs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
    if(currentMerId){ fillHeader(); refreshLedger(); }
  },err=>{ console.error(err); });
}

function loadFinTxs(){
  const q=query(collection(db,"finance_transactions"),where("type","==","merchant"));
  onSnapshot(q,snap=>{
    finTxs=snap.docs.map(d=>({id:d.id,...d.data()})).filter(t=>t._active!==false);
    renderList();
    if(currentMerId){ fillHeader(); refreshLedger(); }
  },err=>{ console.error(err); });
}

function loadActivityOpMap(){
  const q=query(collection(db,"activityLog"),orderBy("createdAt","desc"));
  onSnapshot(q,snap=>{
    activityOpMap={};
    const total=snap.size;
    let rowNum=total;
    snap.forEach(d=>{
      const data=d.data();
      if(data.opId){
        activityOpMap[data.opId]=`OP-${String(rowNum).padStart(5,"0")}`;
      }
      rowNum--;
    });
    if(currentMerId) refreshLedger();
  },err=>{ console.error(err); });
}

/* ── قائمة التجار ── */
function renderList(){
  const tbody=document.getElementById("merchants-tbody");
  if(!merchants.length){
    tbody.innerHTML='<tr><td colspan="5"><div class="empty-state">لا يوجد تجار مسجلون بعد</div></td></tr>';
    return;
  }
  tbody.innerHTML="";
  merchants.forEach(mer=>{
    const bal=calcBalance(mer.id);
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><span class="link-cell" data-id="${mer.id}">${esc(mer.name)}</span></td>
      <td>${esc(mer.phone)||"—"}</td>
      <td>${esc(mer.email)||"—"}</td>
      <td style="font-weight:700;color:${bal>=0?"var(--primary-dark)":"var(--danger)"}">${fmt(bal)}</td>
      <td><div class="row-actions">
        <button class="edit" data-id="${mer.id}">تعديل</button>
        <button class="del"  data-id="${mer.id}">حذف</button>
      </div></td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll(".link-cell").forEach(el=>el.addEventListener("click",()=>openDetail(el.dataset.id)));
  tbody.querySelectorAll(".edit").forEach(el=>el.addEventListener("click",()=>{
    const m=merchants.find(x=>x.id===el.dataset.id); if(m) openMerModal(m);
  }));
  tbody.querySelectorAll(".del").forEach(el=>el.addEventListener("click",()=>deleteMer(el.dataset.id)));
}

async function deleteMer(id){
  if(!confirm("هل تريد حذف هذا التاجر؟")) return;
  try{ await deleteDoc(doc(db,"merchants",id)); toast("تم حذف التاجر"); }
  catch(err){ console.error(err); toast("خطأ",true); }
}

/* ── صفحة التفاصيل ── */
function setupDetail(){
  document.getElementById("back-btn").addEventListener("click",backToList);

  // فلاتر كشف الحساب
  document.getElementById("filter-apply-btn").addEventListener("click",refreshLedger);
  document.getElementById("filter-clear-btn").addEventListener("click",()=>{
    const now=new Date();
    document.getElementById("filter-from").value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
    document.getElementById("filter-to").value=now.toISOString().slice(0,10);
    refreshLedger();
  });

  // تصدير CSV
  document.getElementById("export-csv-btn").addEventListener("click",exportLedgerCSV);

  // نموذج الدفعة المالية
  setupFinTxModal();
}

function refreshLedger(){
  renderUnifiedStats();
  renderUnifiedList();
}

function openDetail(id){
  currentMerId=id;
  document.getElementById("list-section").style.display="none";
  document.getElementById("detail-section").style.display="block";
  // ضبط الفلتر الافتراضي: أول يوم في الشهر الحالي → اليوم
  const now=new Date();
  document.getElementById("filter-from").value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  document.getElementById("filter-to").value=now.toISOString().slice(0,10);
  fillHeader();
  refreshLedger();
}

function backToList(){
  currentMerId=null;
  document.getElementById("list-section").style.display="block";
  document.getElementById("detail-section").style.display="none";
}

function fillHeader(){
  const mer=merchants.find(m=>m.id===currentMerId); if(!mer) return;
  document.getElementById("detail-name").textContent   =mer.name??"";
  document.getElementById("detail-address").textContent=mer.address||"لا يوجد عنوان";
  document.getElementById("detail-phone").textContent  =mer.phone||"—";
  document.getElementById("detail-email").textContent  =mer.email||"—";
  const bal=calcBalance(currentMerId);
  const balEl=document.getElementById("detail-balance");
  balEl.textContent=fmt(bal);
  balEl.style.color=bal>=0?"var(--primary-dark)":"var(--danger)";
}

/* ── helpers: parse date string or Firestore timestamp to seconds ── */
function _toSecs(t){
  if(t.date) return new Date(t.date+"T00:00:00").getTime()/1000;
  return t.createdAt?.seconds??0;
}
function _toDateStr(t){
  if(t.date) return t.date; // YYYY-MM-DD
  const d=t.createdAt?.toDate?.();
  return d?d.toISOString().slice(0,10):"";
}

/* ── نافذة إضافة دفعة مالية مباشرة من صفحة التاجر ── */
function setupFinTxModal(){
  const modal=document.getElementById("fin-tx-modal");
  document.getElementById("fin-tx-modal-close").addEventListener("click",closeFinTxModal);
  document.getElementById("fin-tx-cancel-btn").addEventListener("click",closeFinTxModal);
  modal.addEventListener("click",e=>{ if(e.target===modal) closeFinTxModal(); });
  document.getElementById("fin-tx-form").addEventListener("submit",saveFinTx);
  document.getElementById("add-fin-tx-btn").addEventListener("click",()=>{
    document.getElementById("fin-tx-form").reset();
    document.getElementById("fin-tx-date").value=new Date().toISOString().slice(0,10);
    document.getElementById("fin-dir-in").checked=true;
    const mer=merchants.find(m=>m.id===currentMerId);
    document.getElementById("fin-tx-modal-title").textContent=`دفعة مالية — ${mer?.name??""}`;
    modal.classList.add("open");
  });
}
function closeFinTxModal(){ document.getElementById("fin-tx-modal").classList.remove("open"); }

async function saveFinTx(e){
  e.preventDefault();
  const amount=Number(document.getElementById("fin-tx-amount").value);
  if(!amount||amount<=0){ toast("أدخل مبلغاً صحيحاً",true); return; }
  const dir=document.querySelector('input[name="fin_dir"]:checked')?.value;
  if(!dir){ toast("حدد اتجاه الدفعة",true); return; }
  const mer=merchants.find(m=>m.id===currentMerId);
  const btn=document.getElementById("fin-tx-save-btn");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try{
    const cRef=doc(db,"counters","finance_trans");
    let seqNum=1;
    await runTransaction(db,async tx=>{
      const snap=await tx.get(cRef);
      seqNum=(snap.exists()?snap.data().seq:0)+1;
      tx.set(cRef,{seq:seqNum},{merge:true});
    });
    const finId="F-"+String(seqNum).padStart(4,"0");
    await addDoc(collection(db,"finance_transactions"),{
      type:"merchant", dir, amount,
      date:document.getElementById("fin-tx-date").value,
      description:document.getElementById("fin-tx-desc").value.trim(),
      merchantId:currentMerId, merchantName:mer?.name??"",
      partyName:"", employeeId:"", employeeName:"",
      finId, _active:true,
      createdAt:serverTimestamp(), updatedAt:serverTimestamp(),
    });
    toast("تمت إضافة الدفعة — "+finId);
    closeFinTxModal();
  }catch(err){ console.error(err); toast("خطأ أثناء الحفظ",true); }
  finally{ btn.disabled=false; btn.textContent="حفظ الدفعة"; }
}

/* ── بناء قائمة الحركات الموحدة مع فلتر التاريخ ── */
function _buildAllRows(){
  const fromVal=document.getElementById("filter-from").value;
  const toVal  =document.getElementById("filter-to").value;
  const fromD  =fromVal?fromVal:"";
  const toD    =toVal  ?toVal  :"";

  const direct=merchantTxs.filter(t=>t.merchantId===currentMerId).map(t=>({
    _src: t.source==="loading" ? "loading" : "direct",
    seqId: (t.opId && activityOpMap[t.opId])
      ? activityOpMap[t.opId]
      : (t.txId || (t.opId ? t.opId.slice(0,8).toUpperCase() : "—")),
    dateStr:_toDateStr(t),
    dateSecs:_toSecs(t),
    dir:t.type,
    amount:t.amount||0,
    note:t.note||"",
    id:t.id,
  }));
  const fin=finTxs.filter(t=>t.merchantId===currentMerId).map(t=>({
    _src:"finance",
    seqId:t.finId||"—",
    dateStr:t.date||"",
    dateSecs:t.date?new Date(t.date+"T00:00:00").getTime()/1000:0,
    dir:t.dir,
    amount:t.amount||0,
    note:t.description||"",
    id:t.id,
  }));
  let all=[...direct,...fin].sort((a,b)=>b.dateSecs-a.dateSecs);
  if(fromD) all=all.filter(t=>t.dateStr>=fromD);
  if(toD)   all=all.filter(t=>t.dateStr<=toD);
  return all;
}

/* ── إحصائيات الفترة المفلترة ── */
function renderUnifiedStats(){
  const all=_buildAllRows();
  // الإحصائيات الكلية (بدون فلتر) للرصيد الحقيقي
  const allFull=[
    ...merchantTxs.filter(t=>t.merchantId===currentMerId).map(t=>({dir:t.type,amount:t.amount||0})),
    ...finTxs.filter(t=>t.merchantId===currentMerId).map(t=>({dir:t.dir,amount:t.amount||0})),
  ];
  const totalIn =allFull.filter(t=>t.dir==="in") .reduce((s,t)=>s+t.amount,0);
  const totalOut=allFull.filter(t=>t.dir==="out").reduce((s,t)=>s+t.amount,0);
  const net=totalIn-totalOut;

  const filtIn =all.filter(t=>t.dir==="in") .reduce((s,t)=>s+t.amount,0);
  const filtOut=all.filter(t=>t.dir==="out").reduce((s,t)=>s+t.amount,0);
  const isFiltered=document.getElementById("filter-from").value||document.getElementById("filter-to").value;
  const inCount =allFull.filter(t=>t.dir==="in").length;
  const outCount=allFull.filter(t=>t.dir==="out").length;
  document.getElementById("mer-unified-stats").innerHTML=`
    <div class="mer-stat stat-in">
      <div class="msk">📦 إجمالي مسحوبات هذا التاجر${isFiltered?" (الفترة)":""}</div>
      <div class="msv" style="color:#1a6b3a">${fmt(isFiltered?filtIn:totalIn)}</div>
      <div class="mss">
        <strong style="color:#1a6b3a">${inCount} عملية تحميل</strong>
        <br/>البضائع التي أخذها التاجر من المخزن — هذا ما يدين به
      </div>
    </div>
    <div class="mer-stat stat-net">
      <div class="msk">💳 إجمالي مدفوعات التاجر${isFiltered?" (الفترة)":""}</div>
      <div class="msv" style="color:#1a4bbf">${fmt(isFiltered?filtOut:totalOut)}</div>
      <div class="mss">
        <strong style="color:#1a4bbf">${outCount} دفعة</strong>
        <br/>المبالغ التي دفعها التاجر فعلياً حتى الآن
      </div>
    </div>
    <div class="mer-stat stat-out">
      <div class="msk">💰 المبلغ المستحق على هذا التاجر</div>
      <div class="msv" style="color:${net>=0?"#b3432f":"#1a6b3a"}">
        ${fmt(Math.abs(net))}
      </div>
      <div class="mss">
        <strong style="color:${net>=0?"#b3432f":"#1a6b3a"}">
          ${net>=0?"⚠️ على التاجر سداد هذا المبلغ":"✅ رصيد دائن — التاجر دفع أكثر"}
        </strong>
        <br/>${allFull.length} عملية إجمالاً (مسحوبات − مدفوعات)
      </div>
    </div>`;
}

/* ── كشف الحساب ── */
function renderUnifiedList(){
  const list=document.getElementById("unified-list"); if(!list) return;
  const all=_buildAllRows();
  if(!all.length){
    list.innerHTML='<div class="empty-state">لا توجد حركات في هذه الفترة</div>';
    return;
  }
  list.innerHTML="";

  // ── حساب الرصيد الافتتاحي (ما قبل الفترة المفلترة) ──
  const fromVal=document.getElementById("filter-from").value;
  let openingBalance=0;
  if(fromVal){
    // كل الحركات قبل تاريخ البداية (من كلا المصدرين، بدون فلتر)
    const allDirect=merchantTxs.filter(t=>t.merchantId===currentMerId);
    const allFin   =finTxs.filter(t=>t.merchantId===currentMerId);
    [...allDirect,...allFin].forEach(t=>{
      const ds=t.date??(t.createdAt?.toDate?.()?.toISOString().slice(0,10)??"");
      if(ds && ds<fromVal) openingBalance+=(t.type==="in"||t.dir==="in"?1:-1)*(t.amount||0);
    });
  }

  // نحسب الرصيد التراكمي من الأقدم للأحدث ثم نعكس الترتيب للعرض
  let runningBalance=openingBalance;
  const sorted=[...all].reverse();
  const balances=[];
  sorted.forEach(t=>{
    runningBalance+=(t.dir==="in"?1:-1)*t.amount;
    balances.push(runningBalance);
  });
  balances.reverse();

  all.forEach((t,i)=>{
    const isIn=t.dir==="in";
    const div=document.createElement("div");
    div.className="record-row";
    const typeBadge=t._src==="finance"
      ?`<span style="font-size:10px;background:#fdf4e3;color:#7a4f10;border-radius:5px;padding:2px 7px;font-weight:700;white-space:nowrap">مالية</span>`
      :t._src==="loading"
        ?`<span style="font-size:10px;background:#edf7ed;color:#2e7d32;border-radius:5px;padding:2px 7px;font-weight:700;white-space:nowrap">📦 تحميل</span>`
        :`<span style="font-size:10px;background:#f0f4fb;color:#2a5bbf;border-radius:5px;padding:2px 7px;font-weight:700;white-space:n�wrap">مباشرة</span>`;
    const dateDisp=t.dateStr
      ? new Date(t.dateStr+"T00:00:00").toLocaleDateString("ar-EG",{year:"numeric",month:"short",day:"numeric"})
      : "—";
    const bal=balances[i];
    div.innerHTML=`
      <span class="rec-id" style="min-width:62px;text-align:center">${esc(t.seqId)}</span>
      ${typeBadge}
      <div class="record-main">
        <div class="title">${esc(t.note)||(isIn?"دفعة واردة":"دفعة صادرة")}</div>
        <div class="meta">${dateDisp}</div>
      </div>
      <div class="record-amount ${isIn?"in":"out"}">${fmt(t.amount)}</div>
      <div style="font-size:11px;color:${bal>=0?"var(--primary-dark)":"var(--danger)"};font-weight:700;white-space:nowrap;min-width:80px;text-align:left">
        ${fmt(Math.abs(bal))}<br/><span style="font-weight:400;color:var(--muted)">${bal>=0?"رصيد":"عليه"}</span>
      </div>
      <button class="delete-btn" data-id="${t.id}" data-src="${t._src}">🗑️</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll(".delete-btn").forEach(btn=>btn.addEventListener("click",async()=>{
    const src=btn.dataset.src;
    const isLoading=src==="loading";
    const msg=isLoading
      ?"حذف هذه المعاملة لن يُعيد الكميات للمخزن. هل تريد المتابعة؟"
      :"هل تريد حذف هذه الحركة؟";
    if(!confirm(msg)) return;
    try{
      if(src==="direct"||src==="loading"){
        await deleteDoc(doc(db,"merchantTransactions",btn.dataset.id));
      } else {
        await updateDoc(doc(db,"finance_transactions",btn.dataset.id),{_active:false,deletedAt:serverTimestamp()});
      }
      toast("تم الحذف");
    }catch(err){ console.error(err); toast("خطأ",true); }
  }));
}

/* ── تصدير CSV ── */
function exportLedgerCSV(){
  const mer=merchants.find(m=>m.id===currentMerId);
  const all=_buildAllRows();
  if(!all.length){ toast("لا توجد بيانات للتصدير",true); return; }
  const fromVal=document.getElementById("filter-from").value;
  const toVal  =document.getElementById("filter-to").value;
  const BOM="\uFEFF"; // UTF-8 BOM لدعم Excel العربي
  const header=["الرقم التسلسلي","التاريخ","الاتجاه","المبلغ","البيان","النوع"].join(",");
  const rows=all.map(t=>[
    t.seqId,
    t.dateStr,
    t.dir==="in"?"داخل (تحصيل)":"خارج (دفع)",
    t.amount,
    `"${(t.note||"").replace(/"/g,'""')}"`,
    t._src==="finance"?"مالية":t._src==="loading"?"تحميل":"مباشرة",
  ].join(","));
  const csv=BOM+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const merName=mer?.name??"تاجر";
  const suffix=(fromVal||toVal)?`_${fromVal||""}${toVal?"_إلى_"+toVal:""}` :"";
  a.href=url; a.download=`كشف_حساب_${merName}${suffix}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast("تم التصدير — "+all.length+" سجل");
}
</script>
