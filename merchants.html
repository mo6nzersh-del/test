<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التجار - أحمد وحمدي</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/assets/auth-guard-C6CJ8_8i.css" />
  <style>
    /* ── سجل حركات التاجر ── */
    .record-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
      border-bottom:1px solid var(--border)}
    .record-row:last-child{border-bottom:none}
    .record-badge{display:inline-flex;align-items:center;justify-content:center;
      font-size:11.5px;font-weight:700;border-radius:6px;padding:3px 10px;
      white-space:nowrap;min-width:60px}
    .record-badge.in {background:#e7f5ec;color:#1a6b3a}
    .record-badge.out{background:#fce8e5;color:#b3432f}
    .record-main{flex:1}
    .record-main .title{font-size:14px;font-weight:600;color:var(--ink)}
    .record-main .meta{font-size:12px;color:var(--muted);margin-top:2px}
    .record-amount{font-size:15px;font-weight:800;white-space:nowrap}
    .record-amount.in {color:#1a6b3a}
    .record-amount.out{color:#b3432f}
    .delete-btn{border:none;background:transparent;color:var(--muted);
      font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer}
    .delete-btn:hover{background:var(--danger-soft);color:var(--danger)}
