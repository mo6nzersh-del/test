<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المنتجات - أحمد وحمدي</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="module" crossorigin src="/assets/products-DbXeSzH2.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/auth-guard-DMMO1gWE.js">
    <link rel="modulepreload" crossorigin href="/assets/nav-C4LmEyvm.js">
    <link rel="modulepreload" crossorigin href="/assets/image-utils-ix_Ztzsr.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-guard-C6CJ8_8i.css">
    <style>
      /* ===== Warehouse sections ===== */
      .warehouse-section {
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        background: var(--surface, #fff);
      }
      .warehouse-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        background: var(--surface-2, #f9fafb);
        border-bottom: 1px solid var(--border, #e5e7eb);
        gap: 12px;
      }
      .warehouse-section-title {
        font-weight: 700;
        font-size: 1rem;
        color: var(--text, #111);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .warehouse-section-title .wh-count {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--muted, #6b7280);
        background: var(--border, #e5e7eb);
        border-radius: 20px;
        padding: 1px 9px;
      }
      .warehouse-section-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .warehouse-section-body {
        padding: 16px 18px;
      }
      /* product cards grid inside warehouse */
      .wh-products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 4px;
      }
      .wh-product-card {
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface, #fff);
        transition: box-shadow 0.15s;
      }
      .wh-product-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
      .wh-product-img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        background: var(--surface-2, #f3f4f6);
        display: block;
      }
      .wh-product-img-placeholder {
        width: 100%;
        height: 130px;
        background: var(--surface-2, #f3f4f6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted, #9ca3af);
        font-size: 2rem;
      }
      .wh-product-info {
        padding: 10px 12px 12px;
      }
      .wh-product-name {
        font-weight: 700;
        font-size: 0.93rem;
        color: var(--text, #111);
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .wh-product-serial {
        font-size: 0.75rem;
        color: var(--muted, #6b7280);
        margin-bottom: 6px;
      }
      .wh-product-desc {
        font-size: 0.78rem;
        color: var(--muted, #6b7280);
        margin-bottom: 8px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .wh-product-meta {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 6px;
        flex-wrap: wrap;
      }
      .wh-product-qty {
        font-size: 0.82rem;
        color: var(--text, #111);
        font-weight: 600;
      }
      .wh-product-qty span {
        font-weight: 400;
        color: var(--muted, #6b7280);
        font-size: 0.75rem;
      }
      .wh-product-price {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--accent, #2563eb);
      }
      .wh-product-actions {
        display: flex;
        gap: 6px;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--border, #e5e7eb);
      }
      .wh-product-actions button {
        flex: 1;
        padding: 5px 0;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: inherit;
      }
      .wh-product-actions .edit-btn {
        background: var(--surface-2, #f3f4f6);
        color: var(--text, #111);
      }
      .wh-product-actions .edit-btn:hover { background: var(--border, #e5e7eb); }
      .wh-product-actions .del-btn {
        background: #fee2e2;
        color: #dc2626;
      }
      .wh-product-actions .del-btn:hover { background: #fecaca; }
      .wh-empty-products {
        text-align: center;
        padding: 24px 0;
        color: var(--muted, #9ca3af);
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header id="topbar" class="topbar"></header>
      <main class="page">
        <div class="page-header">
          <div>
            <h2>المنتجات</h2>
            <p>الحركات مع التجار، والمخازن وبضائعها</p>
          </div>
        </div>

        <div class="section-tabs">
          <button type="button" class="active" id="tab-movements">الحركات</button>
          <button type="button" id="tab-warehouses">المخازن والبضائع</button>
        </div>

        <!-- ===== TAB 1: Movements ===== -->
        <div class="section-view active" id="view-movements">
          <div class="panel">
            <h3>تسجيل حركة جديدة</h3>
            <form id="movement-form">
              <div class="toggle-group" style="margin-bottom: 14px">
                <button type="button" class="active out" data-type="out" id="type-out">الخارج للتاجر</button>
                <button type="button" class="in" data-type="in" id="type-in">الداخل من التاجر</button>
              </div>
              <div class="field" style="margin-bottom: 14px">
                <label for="movement-merchant">التاجر</label>
                <select id="movement-merchant" required>
                  <option value="">اختر تاجرًا</option>
                </select>
              </div>
              <div id="movement-lines"></div>
              <button type="button" class="btn small ghost" id="add-line-btn" style="margin-bottom: 16px">+ إضافة منتج آخر</button>
              <button type="submit" class="btn" id="movement-submit-btn">إضافة الحركة</button>
            </form>
          </div>

          <div class="panel">
            <h3>سجل الحركات</h3>
            <div class="records-list" id="movements-list">
              <div class="empty-state">جارِ التحميل...</div>
            </div>
          </div>
        </div>

        <!-- ===== TAB 2: Warehouses & Products ===== -->
        <div class="section-view" id="view-warehouses">
          <div class="panel">
            <div class="panel-header">
              <h3>المخازن</h3>
              <button type="button" class="btn small" id="add-warehouse-btn">+ إضافة مخزن</button>
            </div>
            <div id="warehouses-container">
              <div class="empty-state">جارِ التحميل...</div>
            </div>
          </div>
        </div>

      </main>
    </div>

    <!-- ===== Product Modal ===== -->
    <div class="modal-overlay" id="product-modal">
      <div class="modal-box">
        <div class="modal-box-header">
          <h3 id="product-modal-title">إضافة منتج</h3>
          <button type="button" class="modal-close" id="product-modal-close">&times;</button>
        </div>
        <form id="product-form">
          <input type="hidden" id="product-id" />
          <input type="hidden" id="product-warehouse-id" />

          <div class="field">
            <label for="product-name">اسم المنتج <span style="color:#dc2626">*</span></label>
            <input type="text" id="product-name" required placeholder="مثال: أرز بسمتي" />
          </div>

          <div class="field">
            <label for="product-serial">رقم التعريف التسلسلي</label>
            <input type="text" id="product-serial" placeholder="مثال: PRD-0001" />
          </div>

          <div class="field">
            <label>صورة المنتج (اختياري)</label>
            <label class="file-drop" id="file-drop-label">
              <span id="file-drop-text">اضغط لاختيار صورة</span>
              <img id="image-preview" style="display: none; max-height: 120px; object-fit: contain;" />
            </label>
            <input type="file" id="product-image" accept="image/*" style="display: none" />
          </div>

          <div class="field">
            <label for="product-desc">الوصف</label>
            <input type="text" id="product-desc" placeholder="وصف مختصر للمنتج" />
          </div>

          <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="field" style="margin-bottom: 0">
              <label for="product-quantity">الكمية المتوفرة</label>
              <input type="number" id="product-quantity" min="0" step="0.01" placeholder="0" />
            </div>
            <div class="field" style="margin-bottom: 0">
              <label for="product-qty-type">نوع الكمية</label>
              <select id="product-qty-type">
                <option value="قطعة">قطعة</option>
                <option value="حبة">حبة</option>
                <option value="كيلوغرام">كيلوغرام</option>
                <option value="جرام">جرام</option>
                <option value="طن">طن</option>
                <option value="لتر">لتر</option>
                <option value="متر">متر</option>
                <option value="صندوق">صندوق</option>
                <option value="كرتون">كرتون</option>
                <option value="باكيت">باكيت</option>
                <option value="رول">رول</option>
                <option value="عنصر">عنصر</option>
                <option value="وحدة">وحدة</option>
                <option value="زجاجة">زجاجة</option>
                <option value="علبة">علبة</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="product-price">السعر (ج.م)</label>
            <input type="number" id="product-price" min="0" step="0.01" placeholder="0.00" />
          </div>

          <button type="submit" class="btn" id="product-submit-btn">حفظ المنتج</button>
        </form>
      </div>
    </div>

    <!-- ===== Warehouse Modal ===== -->
    <div class="modal-overlay" id="warehouse-modal">
      <div class="modal-box">
        <div class="modal-box-header">
          <h3>إضافة مخزن</h3>
          <button type="button" class="modal-close" id="warehouse-modal-close">&times;</button>
        </div>
        <form id="warehouse-form">
          <div class="field">
            <label for="warehouse-name">اسم المخزن</label>
            <input type="text" id="warehouse-name" required placeholder="مثال: مخزن المواد الخام" />
          </div>
          <button type="submit" class="btn" id="warehouse-submit-btn">حفظ المخزن</button>
        </form>
      </div>
    </div>

    <!-- ===== Receipt Modal ===== -->
    <div class="modal-overlay" id="receipt-modal">
      <div class="modal-box">
        <div class="modal-box-header">
          <h3>وصل العملية</h3>
          <button type="button" class="modal-close" id="receipt-modal-close">&times;</button>
        </div>
        <div class="receipt-box" id="receipt-content">
          <div class="receipt-brand">أحمد وحمدي</div>
          <div class="receipt-sub" id="receipt-meta">—</div>
          <div class="receipt-lines" id="receipt-lines"></div>
          <div class="receipt-total" id="receipt-total"></div>
        </div>
        <button type="button" class="btn" id="receipt-print-btn" style="margin-top: 16px">طباعة الوصل</button>
      </div>
    </div>

  </body>
</html>
