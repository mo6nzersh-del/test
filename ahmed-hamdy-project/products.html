<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المنتجات والمخزون — أحمد وحمدي</title>
  <link rel="stylesheet" href="/src/css/styles.css" />
  <script type="module" src="/src/js/products.js"></script>
</head>
<body>
  <div class="main-wrapper">
    <div class="page-header">
      <div>
        <div class="page-title">📦 المنتجات والمخزون</div>
        <div class="page-subtitle">عرض الكميات الحالية حسب المخزن</div>
      </div>
    </div>
    <div class="page-content">
      <div class="tabs">
        <button class="tab-btn active" data-tab="inv-tab">📊 المخزون الحالي</button>
        <button class="tab-btn" data-tab="products-tab">📦 إدارة المنتجات</button>
      </div>

      <!-- Inventory view -->
      <div class="tab-content active" id="inv-tab">
        <div class="card" style="margin-bottom:16px">
          <div class="filter-bar" style="margin:0">
            <div class="form-group" style="margin:0;flex:1;max-width:280px">
              <select id="inv-warehouse" class="form-control">
                <option value="">📊 كل المخازن (ملخص)</option>
              </select>
            </div>
            <div class="search-box">
              <input type="text" id="inv-search" class="form-control" placeholder="بحث بالمنتج...">
            </div>
          </div>
        </div>
        <div id="inventory-display">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Products management -->
      <div class="tab-content" id="products-tab">
        <div class="card">
          <div class="card-title">
            <span>قائمة المنتجات الكاملة</span>
            <button class="btn btn-primary" id="add-product-btn">+ إضافة منتج</button>
          </div>
          <div class="filter-bar">
            <div class="search-box">
              <input type="text" id="product-search" class="form-control" placeholder="بحث بالاسم...">
            </div>
          </div>
          <div id="products-grid" class="products-grid">
            <div class="loading-state"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
