<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — أحمد وحمدي</title>
  <link rel="stylesheet" href="/src/css/styles.css" />
  <script type="module" src="/src/js/login.js"></script>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo" id="login-logo-wrap">
      <img src="/logo.png" alt="أحمد وحمدي" onload="this.style.display='block'" style="display:none;width:80px;height:80px;border-radius:12px;object-fit:cover"
           onerror="document.getElementById('login-logo-wrap').innerHTML='<div class=\'login-logo-fb\'>AH</div>'">
    </div>
    <h1 class="login-title">أحمد وحمدي</h1>
    <p class="login-sub">نظام إدارة المخازن والمحاسبة</p>
    <div class="error-msg" id="error-msg"></div>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" class="form-control"
          placeholder="admin@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" class="form-control"
          placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:1rem;margin-top:6px">
        <span id="btn-text">تسجيل الدخول</span>
      </button>
    </form>
  </div>
</body>
</html>
