<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — أحمد وحمدي</title>
  <link rel="stylesheet" href="/src/css/styles.css" />
  <script type="module" src="/src/js/dashboard.js"></script>
</head>
<body>
  <div class="main-wrapper">
    <div class="page-header">
      <div>
        <div class="page-title">📊 لوحة التحكم</div>
        <div class="page-subtitle" id="dash-date">جاري التحميل...</div>
      </div>
      <div class="flex gap-2 items-center" style="flex-wrap:wrap">
        <div id="period-btns" class="flex gap-1" style="background:#f1f5f9;padding:4px;border-radius:8px;border:1px solid var(--border)">
          <button class="tab-btn active" data-period="today">اليوم</button>
          <button class="tab-btn" data-period="week">أسبوع</button>
          <button class="tab-btn" data-period="month">شهر</button>
          <button class="tab-btn" data-period="all">الكل</button>
        </div>
        <div id="custom-dates" style="display:none;gap:6px;align-items:center" class="flex">
          <input type="date" id="date-from" class="form-control" style="width:138px">
          <span style="color:var(--text-muted)">—</span>
          <input type="date" id="date-to" class="form-control" style="width:138px">
          <button class="btn btn-primary btn-sm" id="apply-dates">تطبيق</button>
        </div>
      </div>
    </div>

    <div class="page-content">
      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card blue"><div class="stat-icon">⏳</div><div class="stat-label">جاري التحميل</div><div class="stat-value">—</div></div>
      </div>

      <!-- Quick links -->
      <div class="quick-links">
        <a href="./warehouses.html" class="quick-link"><div class="quick-link-icon">📥</div><div class="quick-link-label">رصيد افتتاحي</div></a>
        <a href="./warehouses.html" class="quick-link"><div class="quick-link-icon">⚙️</div><div class="quick-link-label">عملية إنتاج</div></a>
        <a href="./warehouses.html" class="quick-link"><div class="quick-link-icon">🔄</div><div class="quick-link-label">تحويل مخزن</div></a>
        <a href="./warehouses.html" class="quick-link"><div class="quick-link-icon">🚚</div><div class="quick-link-label">سند تحميل</div></a>
        <a href="./finances.html"   class="quick-link"><div class="quick-link-icon">💰</div><div class="quick-link-label">معاملة مالية</div></a>
        <a href="./salaries.html"   class="quick-link"><div class="quick-link-icon">💸</div><div class="quick-link-label">سلفة موظف</div></a>
      </div>

      <!-- Two column tables -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" class="dash-tables">
        <div class="card" style="margin:0">
          <div class="card-title">
            <span>🔄 آخر الحركات</span>
            <a href="./warehouses.html" class="btn btn-ghost btn-sm">عرض الكل</a>
          </div>
          <div id="recent-movements"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>
        <div class="card" style="margin:0">
          <div class="card-title">
            <span>💳 آخر المعاملات المالية</span>
            <a href="./finances.html" class="btn btn-ghost btn-sm">عرض الكل</a>
          </div>
          <div id="recent-finances"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>
      </div>

      <!-- Inventory snapshot -->
      <div class="card" style="margin-top:20px">
        <div class="card-title">
          <span>📦 لمحة المخزون الحالي</span>
          <a href="./products.html" class="btn btn-ghost btn-sm">تفاصيل</a>
        </div>
        <div id="inventory-snap"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</body>
</html>
