<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التجار — أحمد وحمدي</title>
  <link rel="stylesheet" href="/src/css/styles.css" />
  <script type="module" src="/src/js/merchants.js"></script>
</head>
<body>
  <div class="main-wrapper">
    <div class="page-header">
      <div>
        <div class="page-title">🤝 التجار</div>
        <div class="page-subtitle">إدارة التجار وسجلات الحسابات</div>
      </div>
    </div>
    <div class="page-content">
      <div class="tabs">
        <button class="tab-btn active" data-tab="merchants-list-tab">قائمة التجار</button>
        <button class="tab-btn" data-tab="merchant-transactions-tab">المعاملات</button>
      </div>

      <div class="tab-content active" id="merchants-list-tab">
        <div class="card">
          <div class="card-title">
            <span>التجار المسجلون</span>
            <button class="btn btn-primary" id="add-merchant-btn">+ إضافة تاجر</button>
          </div>
          <div class="filter-bar">
            <div class="search-box">
              <input type="text" id="merchant-search" class="form-control" placeholder="بحث بالاسم أو الهاتف...">
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>#</th><th>الاسم</th><th>العنوان</th><th>الهاتف</th><th>البريد</th><th>الرصيد</th><th>إجراءات</th></tr></thead>
              <tbody id="merchants-tbody">
                <tr><td colspan="7"><div class="loading-state"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-content" id="merchant-transactions-tab">
        <div class="card">
          <div class="card-title">
            <span>معاملات التاجر</span>
            <button class="btn btn-primary" id="add-merchant-tx-btn">+ إضافة معاملة</button>
          </div>
          <div class="filter-bar">
            <select id="merchant-filter" class="form-control" style="min-width:180px">
              <option value="">اختر التاجر</option>
            </select>
            <input type="date" id="tx-from" class="form-control" style="width:145px">
            <input type="date" id="tx-to" class="form-control" style="width:145px">
            <button class="btn btn-ghost btn-sm" id="tx-filter-btn">فلتر</button>
            <button class="btn btn-ghost btn-sm" id="print-statement-btn">🖨️ طباعة كشف</button>
          </div>
          <div id="merchant-summary" class="stats-grid" style="margin-bottom:16px"></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>#</th><th>التاجر</th><th>النوع</th><th>المبلغ</th><th>الوصف</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
              <tbody id="merchant-tx-tbody">
                <tr><td colspan="7"><div class="empty-state"><span class="empty-icon">📊</span><p>اختر تاجراً لعرض معاملاته</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
